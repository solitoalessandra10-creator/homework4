<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Simulazione ABM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Simulazione ABM</h1>

    <div class="controls">
        <div class="input-group">
            <label>Valore iniziale X₀</label>
            <input type="number" id="x0" value="1000">
        </div>
        <div class="input-group">
            <label>Orizzonte T (Anni)</label>
            <input type="number" id="T" value="1">
        </div>
        <div class="input-group">
            <label>Numero step</label>
            <input type="number" id="steps" value="101">
        </div>
        <div class="input-group">
            <label>Drift μ</label>
            <input type="number" id="mu" value="0.5" step="0.1">
        </div>
        <div class="input-group">
            <label>Volatilità σ</label>
            <input type="number" id="sigma" value="2" step="0.1">
        </div>
    </div>

    <div class="actions">
        <button id="btnGenera" onclick="generaSimulazione()">Genera ABM</button>
        <button id="btnReset" onclick="resetSimulazione()">Reset</button>
    </div>

    <div class="results" id="results">
        </div>

    <canvas id="abmChart"></canvas>

    <script src="script.js"></script>
</body>
</html>
