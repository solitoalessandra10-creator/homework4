<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Simulazione ABM</title>

    <!-- Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simulazione Arithmetic Brownian Motion</h1>

<div class="controls">
    <input type="number" id="x0" placeholder="Valore iniziale" value="100">
    <input type="number" id="mu" step="0.01" placeholder="Drift" value="0.05">
    <input type="number" id="sigma" step="0.01" placeholder="Volatilità" value="0.2">
    <input type="number" id="steps" placeholder="Numero step" value="250">

    <div class="buttons">
        <button id="btnGenera" onclick="simulate()">Genera</button>
        <button id="btnReset" onclick="resetChart()">Reset</button>
    </div>
</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
