<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Walk → ABM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Simulazione Random Walk → Moto Browniano</h1>

    <div class="container">
        <label>Numero di passi (n):</label>
        <input type="number" id="passi" value="1000">

        <label>Orizzonte temporale (T):</label>
        <input type="number" id="tempo" value="1" step="0.1">
    </div>

    <div>
        <button id="btnGenera">Genera ABM</button>
        <button id="btnReset">Reset</button>
    </div>

    <div class="card">
        <h2>Random Walk scalata su [0, T]</h2>
        <canvas id="grafico"></canvas>
    </div>

    <div class="card stats" id="stats"></div>

    <script src="script.js"></script>
</body>
</html>
