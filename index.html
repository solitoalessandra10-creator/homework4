<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Simulazione ABM</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simulazione ABM</h1>

<div class="form-row">
    <div class="input-group">
        <label>Valore iniziale X₀</label>
        <input type="number" id="x0" value="1000">
    </div>

    <div class="input-group">
        <label>Orizzonte T</label>
        <input type="number" id="T" value="1">
    </div>

    <div class="input-group">
        <label>Numero step</label>
        <input type="number" id="steps" value="100">
    </div>

    <div class="input-group">
        <label>Drift μ</label>
        <input type="number" id="mu" value="0.5" step="0.01">
    </div>

    <div class="input-group">
        <label>Volatilità σ</label>
        <input type="number" id="sigma" value="2" step="0.01">
    </div>
</div>

<div class="buttons">
    <button id="btnGenera" onclick="simulate()">Genera ABM</button>
    <button id="btnReset" onclick="resetAll()">Reset</button>
</div>

<div class="container">
    <div class="results">
        <h2>Risultati</h2>
        <p><strong>X₀:</strong> <span id="res_x0">-</span></p>
        <p><strong>T:</strong> <span id="res_T">-</span></p>
        <p><strong>Step:</strong> <span id="res_steps">-</span></p>
        <p><strong>Valore finale:</strong> <span id="res_final">-</span></p>
        <p><strong>Min:</strong> <span id="res_min">-</span></p>
        <p><strong>Max:</strong> <span id="res_max">-</span></p>
    </div>

    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
